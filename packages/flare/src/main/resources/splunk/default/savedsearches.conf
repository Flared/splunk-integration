############################################################
# Flare CTEM — Saved Searches
# These searches are available under "Saved Searches" in the
# Splunk navigation bar for the Flare app.
############################################################

# ===========================================================
# 1. All Unique Events (User-requested)
# ===========================================================
[Flare - All Unique Events]
description = Collect all unique Flare events within the selected time range, deduplicated by event UID.
search = `flare_index` sourcetype=flare_json \
| spath path=metadata.uid output=uid \
| dedup uid \
| spath path=metadata.severity output=sev \
| timechart span=1d count by sev
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = column
display.visualizations.charting.chart.stackMode = stacked
display.visualizations.charting.axisTitleX.text = Date
display.visualizations.charting.axisTitleY.text = Event Count
display.visualizations.charting.fieldColors = {"critical": "#ff0040", "high": "#ff8629", "medium": "#ffae00", "low": "#fde82b", "info": "#8594ea"}

# ===========================================================
# 2. Critical & High Severity Events
# ===========================================================
[Flare - Critical and High Severity Events]
description = All events with Critical or High severity — ideal for executive escalation reports.
search = `flare_index` sourcetype=flare_json \
| spath path=metadata.uid output=uid \
| spath path=metadata.severity output=sev \
| search sev="critical" OR sev="high" \
| dedup uid \
| spath path=metadata.type output=etype \
| timechart span=1d count by etype
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = column
display.visualizations.charting.chart.stackMode = stacked
display.visualizations.charting.axisTitleX.text = Date
display.visualizations.charting.axisTitleY.text = Event Count

# ===========================================================
# 3. Leaked Credentials Report
# ===========================================================
[Flare - Leaked Credentials Report]
description = All leaked credential events — critical for identity security reviews.
search = `flare_index` sourcetype=flare_json \
| spath path=metadata.uid output=uid \
| spath path=metadata.type output=etype \
| search etype IN("leaked_credential", "leak", "leaks") \
| dedup uid \
| spath path=metadata.severity output=sev \
| timechart span=1d count by sev
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = line
display.visualizations.charting.axisTitleX.text = Date
display.visualizations.charting.axisTitleY.text = Leaked Credential Events
display.visualizations.charting.fieldColors = {"critical": "#ff0040", "high": "#ff8629", "medium": "#ffae00", "low": "#fde82b", "info": "#8594ea"}

# ===========================================================
# 4. Daily Event Volume Trend
# ===========================================================
[Flare - Daily Event Volume Trend]
description = Daily count of ingested events over the past 30 days — monitors ingestion health.
search = `flare_index` sourcetype=flare_json \
| spath path=metadata.uid output=uid \
| dedup uid \
| timechart span=1d count as "Events Ingested"
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = column

# ===========================================================
# 5. Severity Distribution Breakdown
# ===========================================================
[Flare - Severity Distribution]
description = Breakdown of events by severity level — at-a-glance risk posture.
search = `flare_index` sourcetype=flare_json \
| spath path=metadata.uid output=uid \
| spath path=metadata.severity output=sev \
| dedup uid \
| eval category="All Events" \
| chart count over category by sev \
| fields category, critical, high, medium, low, info
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = column
display.visualizations.charting.fieldColors = {"critical": "#ff0040", "high": "#ff8629", "medium": "#ffae00", "low": "#fde82b", "info": "#8594ea"}

# ===========================================================
# 6. Ingestion Health Check (App Logs)
# ===========================================================
[Flare - Ingestion Health Check]
description = Log volume trend over the last 24 hours, grouped by log level — verify the data pipeline is healthy.
search = index=_internal source="*flare_cron_job.log" log_level=* \
| timechart span=1h count by log_level
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = column

# ===========================================================
# 7. Ingestion Errors Only
# ===========================================================
[Flare - Ingestion Errors]
description = Filters app logs to show only ERROR and CRITICAL entries — fast troubleshooting.
search = index=_internal source="*flare_cron_job.log" (log_level="ERROR" OR log_level="CRITICAL") \
| timechart span=1h count by log_level
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
is_visible = 1
display.general.type = visualizations
display.visualizations.show = 1
display.visualizations.charting.chart = column