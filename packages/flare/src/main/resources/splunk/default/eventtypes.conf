############################################################
# Flare CTEM - Event Type Classifications
############################################################

# Base event type: matches ALL Flare events
[flare_alert]
search = sourcetype="flare_json"

# Ransom Leak events (ransomware gang postings)
[flare_ransomleak]
search = sourcetype="flare_json" event_type="ransomleak"

# Stealer Log events (infostealer malware logs)
[flare_stealer_log]
search = sourcetype="flare_json" event_type="stealer_log"

# Credit Card events (compromised payment cards)
[flare_cc]
search = sourcetype="flare_json" event_type="cc"

# Lookalike Domain events (typosquatting, DNS twist)
[flare_lookalike]
search = sourcetype="flare_json" event_type="lookalike"

# Blog Post events (threat actor blog mentions)
[flare_blog_post]
search = sourcetype="flare_json" event_type="blog_post"

# Chat Message events (dark web chat monitoring)
[flare_chat_message]
search = sourcetype="flare_json" event_type="chat_message"

# Forum Post events (underground forum discussions)
[flare_forum_post]
search = sourcetype="flare_json" event_type="forum_post"

# Paste events (Pastebin, paste sites)
[flare_paste]
search = sourcetype="flare_json" event_type="paste"

# Listing events (dark web marketplace listings)
[flare_listing]
search = sourcetype="flare_json" event_type="listing"

# Bucket events (exposed cloud storage buckets)
[flare_bucket]
search = sourcetype="flare_json" event_type="bucket"

# Social Media Account events
[flare_social_media]
search = sourcetype="flare_json" event_type="social_media_account"
