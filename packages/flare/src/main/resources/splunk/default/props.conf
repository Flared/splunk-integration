############################################################
# Flare CTEM - Source Type Configuration & CIM Field Mapping
# Pattern: EXTRACT (regex) + EVAL (CIM normalization)
############################################################

[flare_json]
category = Structured
description = Flare CTEM events
MAX_TIMESTAMP_LOOKAHEAD = 0

# Timestamp: explicitly parses the "timestamp" key (matched_at / estimated_created_at) prepended by the ingestion script
# TIME_PREFIX = \"timestamp\"\s*:\s*\"
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z

# ============================================================
# EXTRACT: Common Fields (present in all event types)
# ============================================================
# event_type: extracted from metadata.type in the API response
EXTRACT-event_type = "metadata"\s*:\s*\{[^}]*"type"\s*:\s*"(?<event_type>[^"]+)"
EXTRACT-tenant_id = "tenant_id"\s*:\s*(?<tenant_id>\d+)
EXTRACT-tenant_name = "tenant_name"\s*:\s*"(?<tenant_name>[^"]+)"

# --- metadata block ---
EXTRACT-metadata_uid = "uid"\s*:\s*"(?<metadata_uid>[^"]+)"
EXTRACT-metadata_severity = "severity"\s*:\s*"(?<metadata_severity>[^"]+)"
EXTRACT-metadata_flare_url = "flare_url"\s*:\s*"(?<metadata_flare_url>[^"]+)"
EXTRACT-metadata_estimated_created_at = "estimated_created_at"\s*:\s*"(?<metadata_estimated_created_at>[^"]+)"
EXTRACT-metadata_matched_at = "matched_at"\s*:\s*"(?<metadata_matched_at>[^"]+)"

# ============================================================
# EXTRACT: Common Data Fields (shared across many event types)
# ============================================================
EXTRACT-data_url = "url"\s*:\s*"(?<data_url>https?://[^"]+)"
EXTRACT-data_content = "content"\s*:\s*"(?<data_content>[^"]{0,500})"
EXTRACT-data_title = "title"\s*:\s*"(?<data_title>[^"]+)"
EXTRACT-data_body = "body"\s*:\s*"(?<data_body>[^"]{0,500})"
EXTRACT-data_posted_at = "posted_at"\s*:\s*"(?<data_posted_at>[^"]+)"
EXTRACT-data_response_url = "response_url"\s*:\s*"(?<data_response_url>[^"]+)"
EXTRACT-data_description = "description"\s*:\s*"(?<data_description>[^"]+)"

# --- actor block ---
EXTRACT-actor_id = "actor"\s*:\s*\{[^}]*"id"\s*:\s*"(?<actor_id>[^"]+)"
EXTRACT-actor_name = "actor"\s*:\s*\{[^}]*"name"\s*:\s*"(?<actor_name>[^"]+)"

# --- context block ---
EXTRACT-context_conversation_name = "conversation_name"\s*:\s*"(?<context_conversation_name>[^"]+)"
EXTRACT-context_category_name = "category_name"\s*:\s*"(?<context_category_name>[^"]+)"
EXTRACT-context_topic_title = "topic_title"\s*:\s*"(?<context_topic_title>[^"]+)"

# ============================================================
# EXTRACT: Ransom Leak - Victim Information
# Uses [\s\S] instead of [^}] to cross nested objects
# ============================================================
EXTRACT-victim_name = "victim_information"\s*:\s*\{[\s\S]*?"name"\s*:\s*"(?<victim_name>[^"]+)"
EXTRACT-victim_display_name = "display_name"\s*:\s*"(?<victim_display_name>[^"]+)"
EXTRACT-victim_domain = "victim_information"\s*:\s*\{[\s\S]*?"domain"\s*:\s*"(?<victim_domain>[^"]+)"
EXTRACT-victim_industry = "industry"\s*:\s*"(?<victim_industry>[^"]+)"
EXTRACT-victim_employee_count = "employee_count"\s*:\s*(?<victim_employee_count>\d+)
EXTRACT-victim_city = "victim_information"\s*:\s*\{[\s\S]*?"city"\s*:\s*"(?<victim_city>[^"]+)"
EXTRACT-victim_state = "victim_information"\s*:\s*\{[\s\S]*?"state"\s*:\s*"(?<victim_state>[^"]+)"
EXTRACT-victim_country = "victim_information"\s*:\s*\{[\s\S]*?"country"\s*:\s*"(?<victim_country>[^"]+)"

# ============================================================
# EXTRACT: Stealer Log - Victim & Malware Information
# ============================================================
EXTRACT-victim_ip_address = "ip_address"\s*:\s*"(?<victim_ip_address>[^"]+)"
EXTRACT-victim_ip_network = "ip_network"\s*:\s*"(?<victim_ip_network>[^"]+)"
EXTRACT-victim_username = "username"\s*:\s*"(?<victim_username>[^"]+)"
EXTRACT-victim_country_code = "country_code"\s*:\s*"(?<victim_country_code>[^"]+)"
EXTRACT-victim_os = "os"\s*:\s*"(?<victim_os>[^"]+)"
EXTRACT-victim_timezone = "timezone"\s*:\s*"(?<victim_timezone>[^"]+)"
EXTRACT-malware_family = "malware_family"\s*:\s*"(?<malware_family>[^"]+)"
EXTRACT-malware_build_id = "build_id"\s*:\s*"(?<malware_build_id>[^"]+)"
EXTRACT-malware_file_location = "file_location"\s*:\s*"(?<malware_file_location>[^"]+)"
EXTRACT-malware_infected_at = "infected_at"\s*:\s*"(?<malware_infected_at>[^"]+)"

# ============================================================
# EXTRACT: Credit Card
# ============================================================
EXTRACT-cc_bank = "bank"\s*:\s*"(?<cc_bank>[^"]+)"
EXTRACT-cc_bin = "bin"\s*:\s*"(?<cc_bin>[^"]+)"
EXTRACT-cc_brand = "brand"\s*:\s*"(?<cc_brand>[^"]+)"
EXTRACT-cc_country = "country"\s*:\s*"(?<cc_country>[^"]+)"
EXTRACT-cc_expiration = "expiration"\s*:\s*"(?<cc_expiration>[^"]+)"
EXTRACT-cc_owner = "owner"\s*:\s*"(?<cc_owner>[^"]+)"

# ============================================================
# EXTRACT: Lookalike Domain
# ============================================================
EXTRACT-lookalike_domain = "domain"\s*:\s*"(?<lookalike_domain>[^"]+)"
EXTRACT-lookalike_registered_at = "registered_at"\s*:\s*"(?<lookalike_registered_at>[^"]+)"
EXTRACT-lookalike_issuer = "issuer"\s*:\s*"(?<lookalike_issuer>[^"]+)"

# ============================================================
# EXTRACT: Bucket
# ============================================================
EXTRACT-bucket_host = "bucket"\s*:\s*\{[^}]*"host"\s*:\s*"(?<bucket_host>[^"]+)"
EXTRACT-bucket_provider = "provider"\s*:\s*"(?<bucket_provider>[^"]+)"

# ============================================================
# EXTRACT: Social Media Account
# ============================================================
EXTRACT-social_site = "site"\s*:\s*"(?<social_site>[^"]+)"
EXTRACT-social_username = "username"\s*:\s*"(?<social_username>[^"]+)"

# ============================================================
# EXTRACT: Listing
# ============================================================
EXTRACT-listing_currency = "currency"\s*:\s*"(?<listing_currency>[^"]+)"
EXTRACT-listing_price = "price"\s*:\s*(?<listing_price>[\d.]+)

# ============================================================
# EXTRACT: Chat Message - Forward Info
# ============================================================
EXTRACT-forwarded_from = "forwarded_from"\s*:\s*"(?<forwarded_from>[^"]+)"
EXTRACT-was_forwarded = "was_forwarded"\s*:\s*(?<was_forwarded>true|false)

# ============================================================
# CIM Normalization (EVAL)
# ============================================================

# --- Alerts Data Model ---
EVAL-vendor = "Flare"
EVAL-app = "flare"
EVAL-vendor_action = "allowed"
EVAL-alert_type = event_type
EVAL-severity = metadata_severity
EVAL-signature = coalesce(data_title, victim_name, lookalike_domain, actor_name, social_username, cc_brand, "Flare CTEM Alert")
EVAL-alert_id = metadata_uid
EVAL-flare_url = metadata_flare_url

# --- Network / Endpoint ---
EVAL-dest_ip = victim_ip_address
EVAL-dest = coalesce(victim_ip_address, victim_domain, lookalike_domain, bucket_host)
EVAL-url = coalesce(data_url, data_response_url)
EVAL-dest_host = coalesce(victim_domain, lookalike_domain, bucket_host)

# --- User / Identity ---
EVAL-user = coalesce(victim_username, actor_name, social_username, cc_owner)
EVAL-user_name = coalesce(victim_username, actor_name, social_username)
EVAL-src_user = actor_name

# --- Malware ---
EVAL-malware = malware_family
EVAL-file_path = malware_file_location

# --- Threat Intel ---
EVAL-threat_source = "Flare CTEM"
EVAL-category = coalesce(context_category_name, event_type)

# ============================================================
# Internal Log Parsing (for App Logs Dashboard)
# ============================================================
[source::...flare_cron_job.log]
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d %H:%M:%S %z
# Log Format: 2026-03-31 16:52:15 +0530 INFO Event fetch response...
EXTRACT-log_level = ^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\s\S+\s+(?<log_level>\w+)
EXTRACT-log_message = ^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\s\S+\s+\w+\s+(?<log_message>.+)